name: Preview - Build Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to preview build'
        required: true
        type: string
      pr_number:
        description: 'Optional PR number for a pr-<number>-<sha> tag'
        required: false
        default: ''
        type: string
      refresh_shared_cache:
        description: 'Rebuild from scratch and refresh the shared image cache'
        required: false
        default: false
        type: boolean

env:
  ghcr_image: ghcr.io/${{ github.repository_owner }}/grimmory
  ghcr_cache_ref: ghcr.io/${{ github.repository_owner }}/grimmory:buildcache

jobs:
  build-and-push:
    name: Build and Push Preview Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ inputs.ref }}

      - name: Generate Preview Tag
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          short_sha=$(git rev-parse --short HEAD)

          if [ -n "$PR_NUMBER" ]; then
            case "$PR_NUMBER" in
              (*[!0-9]*)
                echo "Invalid PR number: $PR_NUMBER"
                exit 1
                ;;
            esac
            preview_tag="pr-${PR_NUMBER}-${short_sha}"
          else
            preview_tag="preview-${short_sha}"
          fi

          echo "preview_tag=$preview_tag" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "image_ref=${{ env.ghcr_image }}:${preview_tag}" >> "$GITHUB_ENV"
          echo "Preview tag: $preview_tag"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Preview image
        if: ${{ !inputs.refresh_shared_cache }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.image_ref }}
          build-args: |
            APP_VERSION=${{ env.preview_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=${{ env.ghcr_cache_ref }}

      - name: Build and push Preview image with cache refresh
        if: ${{ inputs.refresh_shared_cache }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.image_ref }}
          build-args: |
            APP_VERSION=${{ env.preview_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=${{ env.ghcr_cache_ref }},mode=max

      - name: Write Usage Summary
        run: |
          {
            echo "## Preview Image Ready"
            echo
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo "- Commit: \`${{ env.commit_sha }}\`"
            echo "- Image: \`${{ env.image_ref }}\`"
            echo
            echo "### Docker Compose"
            echo '```yaml'
            echo "services:"
            echo "  grimmory:"
            echo "    image: ${{ env.image_ref }}"
            echo "    container_name: grimmory"
            echo "    environment:"
            echo "      - USER_ID=1000"
            echo "      - GROUP_ID=1000"
            echo "      - TZ=Etc/UTC"
            echo "      - DATABASE_URL=jdbc:mariadb://mariadb:3306/grimmory"
            echo "      - DATABASE_USERNAME=grimmory"
            echo "      - DATABASE_PASSWORD=your_secure_password"
            echo "      - API_DOCS_ENABLED=false"
            echo "      - DISK_TYPE=LOCAL"
            echo "    depends_on:"
            echo "      mariadb:"
            echo "        condition: service_healthy"
            echo '    ports: ["6060:6060"]'
            echo "    volumes:"
            echo "      - ./data:/app/data"
            echo "      - ./books:/books"
            echo "      - ./bookdrop:/bookdrop"
            echo "    restart: unless-stopped"
            echo
            echo "  mariadb:"
            echo "    image: lscr.io/linuxserver/mariadb:11.4.8"
            echo "    container_name: mariadb"
            echo "    environment:"
            echo "      - PUID=1000"
            echo "      - PGID=1000"
            echo "      - TZ=Etc/UTC"
            echo "      - MYSQL_ROOT_PASSWORD=super_secure_password"
            echo "      - MYSQL_DATABASE=grimmory"
            echo "      - MYSQL_USER=grimmory"
            echo "      - MYSQL_PASSWORD=your_secure_password"
            echo "    volumes:"
            echo "      - ./config:/config"
            echo "    restart: unless-stopped"
            echo "    healthcheck:"
            echo '      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]'
            echo "      interval: 5s"
            echo "      timeout: 5s"
            echo "      retries: 10"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
