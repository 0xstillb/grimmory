name: Main - Build and Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-main-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-check:
    name: Flyway Migration Check
    uses: ./.github/workflows/migrations-check.yml
    with:
      base_ref: ${{ github.event.before }}
      head_ref: ${{ github.sha }}
      checkout_ref: ${{ github.sha }}

  test-suite:
    name: Test Suite
    needs: [migration-check]
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ github.sha }}
      save_gradle_cache: true

  build-and-push:
    name: Build and Push Main Image
    needs: [migration-check, test-suite]
    if: ${{ needs.test-suite.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Capture Main Build Metadata
        id: meta
        shell: bash
        run: |
          set -eu

          short_sha="$(git rev-parse --short HEAD)"

          {
            echo "commit_sha=$(git rev-parse HEAD)"
            echo "app_version=main-${short_sha}"
            echo "image_name=ghcr.io/${GITHUB_REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Docker Hub
        if: ${{ vars.DOCKERHUB_REGISTRY != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ vars.DOCKERHUB_REGISTRY }}
            ${{ steps.meta.outputs.image_name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Main image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            APP_REVISION=${{ steps.meta.outputs.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=${{ steps.meta.outputs.image_name }}:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=${{ steps.meta.outputs.image_name }}:buildcache,mode=max
