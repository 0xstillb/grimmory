name: Develop - Build and Publish Test Image

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: publish-develop
  cancel-in-progress: true

jobs:
  test-suite:
    name: Test Suite
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ github.sha }}
      save_gradle_cache: true

  build-and-push:
    name: Build and Push Test Image
    needs: [test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Compute Image Tags
        id: tags
        run: |
          set -eu
          short_sha="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y%m%d)"
          echo "version_tag=develop-${build_date}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Test Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:develop
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.version_tag }}
          build-args: |
            APP_VERSION=${{ steps.tags.outputs.version_tag }}
            APP_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max

  export-openapi:
    name: Export OpenAPI Artifact
    needs: [test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Export OpenAPI JSON
        uses: ./.github/actions/export-openapi
        with:
          checkout_ref: ${{ github.sha }}
          app_version: develop

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-develop
          path: backend/build/openapi/grimmory-openapi.json
          retention-days: 14
