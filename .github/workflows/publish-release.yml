name: On Release Published

on:
  release:
    types:
      - released

jobs:
  build-and-release:
    name: Build, Publish, and Finalize Stable Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Set Up QEMU for Multi-Arch Builds
        id: qemu
        continue-on-error: true
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          cache-image: false

      - name: Resolve Build Platforms
        id: release_platforms
        run: |
          if [ "${{ steps.qemu.outcome }}" = "success" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "QEMU setup failed; falling back to linux/amd64 for this release run"
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Docker Hub
        if: ${{ vars.DOCKERHUB_REGISTRY != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ vars.DOCKERHUB_REGISTRY }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name }}

      - name: Build and push Stable image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ steps.release_platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}
            APP_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

  publish-helm-chart:
    name: Publish Helm Chart to GHCR
    needs:
      - build-and-release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Set Up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Package and Push Helm Chart
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eu
          VERSION="${RELEASE_TAG#v}"
          helm dependency update deploy/helm/grimmory
          helm package deploy/helm/grimmory \
            --version "${VERSION}" \
            --app-version "${RELEASE_TAG}"
          helm push "grimmory-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/helm-charts"

  build-release-assets:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Install just
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: just

      - name: Set Up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set Up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Frontend Dependencies
        run: just ui install-ci

      - name: Build Frontend
        run: just ui build

      - name: Build Backend JAR
        run: just api build

      - name: Export OpenAPI JSON
        uses: ./.github/actions/export-openapi
        with:
          checkout_ref: ${{ github.sha }}
          app_version: ${{ github.event.release.tag_name }}

      - name: Prepare Release Assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eu
          jar_file="$(find backend/build/libs -name '*.jar' -not -name '*-plain.jar' | head -1)"
          cp "$jar_file" "grimmory-${RELEASE_TAG}.jar"
          cp backend/build/openapi/grimmory-openapi.json openapi.json

      - name: Upload Assets to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "grimmory-${RELEASE_TAG}.jar" \
            openapi.json \
            --clobber
